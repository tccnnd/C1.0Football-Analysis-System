version: c1.phase1

thresholds:
  info_quality_warning: 0.55
  info_quality_critical: 0.35
  lineup_required_within_hours: 2
  lineup_freshness_warning_hours: 12
  missing_elo_loss_warning: 0.08
  high_confidence_min: 0.68
  low_info_high_confidence_quality_max: 0.50
  odds_move_against_model_warning: 0.08
  line_move_against_model_warning: 0.08
  market_divergence_soft: 0.12
  market_divergence_hard: 0.22
  injury_conflict_hard: 0.70
  chaos_score_observe: 0.55
  chaos_score_block: 0.82
  circuit_breaker_losing_streak: 5

  # foot (Go) 信号阈值
  # 欧亚联动冲突分数触发软冲突的最低值（0=无冲突，1=强冲突）
  foot_euro_asia_conflict_soft: 0.40
  # 欧亚联动冲突分数触发硬冲突的最低值
  foot_euro_asia_conflict_hard: 0.75
  # 亚赔信号强度：当信号方向与模型预测相反时触发
  foot_asia_signal_against_model_soft: 0.45
  # foot 多模型共识与 C1.0 预测方向不一致时触发（agreement < 阈值）
  foot_model_disagreement_soft: 0.30

decision_rules:
  observe_min_soft_conflicts: 3
  # foot_model_agreement 影响决策的阈值
  # agreement >= 此值时视为 foot 模型确认，加 tag 并放宽 observe 阈值
  foot_model_agreement_confirm: 0.75
  # agreement < 此值时视为 foot 模型分歧，observe 阈值降低 1
  foot_model_agreement_weak: 0.30
  # agreement < 此值时视为极度分歧，直接触发 OBSERVE（不管软冲突数量）
  foot_model_agreement_critical: 0.15

feature_rules:
  freshness_hours_cap: 24
  info_quality_weights:
    context_completeness: 0.28
    odds_snapshot_quality: 0.24
    team_availability_quality: 0.18
    freshness_score: 0.18
    source_reliability: 0.12
  chaos_weights:
    market_divergence: 0.24
    odds_move_against_model: 0.18
    line_move_against_model: 0.16
    injury_conflict_score: 0.18
    schedule_pressure: 0.10
    weather_risk: 0.08
    lineup_penalty: 0.06
