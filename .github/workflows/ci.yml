name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  c1-tests:
    name: C1 tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run C1 test suite
        env:
          PYTHONPATH: .:src
        run: python -m pytest -q tests/test_c1_*.py
